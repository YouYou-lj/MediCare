server:
  port: 8080

spring:
  config:
    import:
      - optional:file:./application-secret.yml
      - optional:file:./medicare-server/application-secret.yml

  datasource:
    url: jdbc:mysql://localhost:3306/medicare?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: a123456.
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    com.medicare: debug
    org.hibernate.SQL: debug

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.medicare.controller

ai:
  provider: ${AI_PROVIDER:bailian}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:deepseek-v4-flash}
  embedding-model: ${AI_EMBEDDING_MODEL:text-embedding-v4}
  base-url: ${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  timeout: ${AI_TIMEOUT:20s}
