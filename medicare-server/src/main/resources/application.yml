server:
  port: 8080

spring:
  config:
    import:
      - optional:file:./application-secret.yml
      - optional:file:./medicare-server/application-secret.yml

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:medicare}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:a123456.}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    com.medicare: debug
    org.hibernate.SQL: debug

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.medicare.controller

ai:
  provider: ${AI_PROVIDER:bailian}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:deepseek-v4-flash}
  embedding-model: ${AI_EMBEDDING_MODEL:text-embedding-v4}
  base-url: ${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  timeout: ${AI_TIMEOUT:20s}
  executor:
    generation-core-size: ${AI_GENERATION_CORE_SIZE:4}
    generation-max-size: ${AI_GENERATION_MAX_SIZE:12}
    retrieval-core-size: ${AI_RETRIEVAL_CORE_SIZE:4}
    retrieval-max-size: ${AI_RETRIEVAL_MAX_SIZE:12}
    queue-capacity: ${AI_EXECUTOR_QUEUE_CAPACITY:100}
    retrieval-min-parallel-chunks: ${AI_RETRIEVAL_MIN_PARALLEL_CHUNKS:32}
    vector-core-size: ${AI_EXECUTOR_VECTOR_CORE_SIZE:4}
    vector-max-size: ${AI_EXECUTOR_VECTOR_MAX_SIZE:8}
  vector:
    enabled: ${AI_VECTOR_ENABLED:true}
    store: ${AI_VECTOR_STORE:qdrant}
    host: ${AI_VECTOR_HOST:localhost}
    port: ${AI_VECTOR_PORT:6334}
    use-tls: ${AI_VECTOR_USE_TLS:false}
    collection: ${AI_VECTOR_COLLECTION:medicare_knowledge}
    dimension: ${AI_VECTOR_DIMENSION:1024}
    distance: ${AI_VECTOR_DISTANCE:cosine}
